<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unggah File Sederhana</title>
    <style>
        /* CSS Diselaraskan dengan upload.php */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            color: #c02424;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background: #ffaeae;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
        }
        h2 {
            color: #2c3e50;
            margin-top: 0;
            margin-bottom: 25px;
            border-bottom: 2px solid #edf2f7;
            padding-bottom: 15px;
        }
        .form-group {
            margin-bottom: 25px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 10px;
            color: #475569;
            font-weight: 600;
            font-size: 15px;
        }
        /* Style untuk input file custom agar tidak kaku */
        input[type="file"] {
            width: 100%;
            padding: 10px;
            background: #da58ee;
            border: 1px dashed #cbd5e1;
            border-radius: 6px;
            box-sizing: border-box;
            cursor: pointer;
            color: #64748b;
        }
        input[type="file"]:hover {
            border-color: #00ff6a;
            background: #f0f7ff;
        }
        /* Tombol Unggah (Diselaraskan dengan warna biru btn-download) */
        input[type="submit"] {
            width: 100%;
            background-color: #ff0000;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease;
            box-shadow: 0 2px 4px rgba(59, 130, 246, 0.2);
        }
        input[type="submit"]:hover {
            background-color: #2563eb;
        }
        .note {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 15px;
            display: block;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Unggah Berkas Baru</h2>
    
    <form action="upload.php" method="post" enctype="multipart/form-data">
        <div class="form-group">
            <label for="fileToUpload">Pilih file untuk diunggah:</label>
            <input type="file" name="fileToUpload" id="fileToUpload" required>
        </div>
        
        <input type="submit" value="Unggah File Sekarang" name="submit">
    </form>

    <small class="note">Hanya mendukung format: JPG, JPEG, PNG, & GIF (Maks. 500KB)</small>
</div>

</body>
</html>
